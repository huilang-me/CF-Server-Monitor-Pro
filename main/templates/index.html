<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{SITE_TITLE}}</title>
    {{CUSTOM_HEAD}}
    <style>{{THEME_STYLES}}</style>
</head>
<body class="{{THEME_CLASS}}">
    <div class="container">
        <div class="header">
            <h1>{{SITE_TITLE}}</h1>
            <a href="/admin" class="admin-btn">后台管理</a>
        </div>
        <div id="ajax-cards" class="grid-container">加载数据中...</div>
    </div>

    <script>
        // 核心渲染逻辑：从 Worker 获取 JSON 数据并渲染
        async function loadData() {
            try {
                // 这里的 /api/servers_all 对应 Worker 中你要实现的那个接口
                const res = await fetch(window.__HOST_ORIGIN__ + '/api/servers_all');
                const data = await res.json();
                
                const container = document.getElementById('ajax-cards');
                container.innerHTML = ''; // 清空加载中提示

                data.servers.forEach(server => {
                    // 这里编写你的卡片渲染逻辑，或者调用原本的拼接函数
                    const card = document.createElement('a');
                    card.className = 'vps-card';
                    card.href = '/?id=' + server.id;
                    card.innerHTML = `
                        <div class="card-left">
                            <div class="card-title">
                                <div class="status-dot" style="background:${(Date.now() - server.last_updated) < 300000 ? '#10b981' : '#ef4444'};"></div>
                                <span>${server.name}</span>
                            </div>
                            <div class="card-meta">CPU: ${server.cpu}% | RAM: ${server.ram}%</div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                console.error("Render failed:", e);
            }
        }
        loadData();
        setInterval(loadData, 15000);
    </script>
</body>
</html>
